name: Daily Model Training Statistics

on:
  schedule:
    # Run Monday-Friday at 7 AM UTC
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  model-training-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn google-auth gspread requests
      
      - name: Run model training and stats
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python model_training_slack.py
      
      - name: Report completion
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ Model training statistics report completed successfully"
          else
            echo "❌ Model training statistics report failed"
          fi
